# This config contains the default values for training an English 22.05kHz DiscreteSpeech model.
# If you want to train a model on other dataset, you can change config values according to your dataset.
# Most dataset-specific arguments are in the head of the config file, see below.

name: DiscreteSpeech

max_epochs: ???
batch_size: ???

feature_name: ???
audio_codec_name: null
audio_codec_path: null

train_ds_type: ???
train_ds_meta: ???
val_ds_meta: ???
log_ds_meta: ???

phoneme_dict_path: ???
heteronyms_path: ???

log_dir: ???

# The below feature config should match the feature.yaml config used during preprocessing.
sample_rate: 22050

context_emb_dim: 128

codebook_num: 7
codebook_levels: [4, 4, 4, 4, 4, 4]
codebook_dim: 42
codebook_size: 4096

semantic_codebook_num: 1
semantic_codebook_dim: 6

acoustic_codebook_num: 6
acoustic_codebook_dim: 36

acoustic_codebook_train_num: 9
acoustic_codebook_train_size: 256
acoustic_codebook_train_levels: [4, 4, 4, 4]

context_min_len: 50
context_max_len: 125

num_duration: 15
num_speaking_rate: 41

fps_max: -1.2
fps_min: -2.4

feature_readers:
  audio_codec:
    _target_: nemo.collections.tts.parts.preprocessing.features.AudioCodecFeatureReader
    feature_filename: ${feature_name}
    sample_rate: ${sample_rate}

aligner_text_dim: 256

context_hidden_dim: 512
context_filters: 2048

text_hidden_dim: 1024
text_filters: 4096

duration_hidden_dim: 512
duration_filters: 2048

audio_hidden_dim: 512
audio_filters: 2048

model:
  aligner_text_dim: ${aligner_text_dim}
  context_min_len: ${context_min_len}
  context_max_len: ${context_max_len}

  max_token_duration: ${num_duration}
  num_codebooks: ${codebook_num}
  semantic_codebook_num: ${semantic_codebook_num}
  semantic_codebook_dim: ${semantic_codebook_dim}
  acoustic_codebook_num: ${acoustic_codebook_train_num}
  acoustic_codebook_dim: ${acoustic_codebook_dim}

  vector_quantizer:
    _target_: nemo.collections.tts.modules.audio_codec_modules.GroupFiniteScalarQuantizer
    num_groups: ${codebook_num}
    num_levels_per_group: ${codebook_levels}

  vector_quantizer_semantic:
    _target_: nemo.collections.tts.modules.audio_codec_modules.GroupFiniteScalarQuantizer
    num_groups: ${semantic_codebook_num}
    num_levels_per_group: ${codebook_levels}

  vector_quantizer_acoustic:
    _target_: nemo.collections.tts.modules.audio_codec_modules.GroupFiniteScalarQuantizer
    num_groups: ${acoustic_codebook_train_num}
    num_levels_per_group: ${acoustic_codebook_train_levels}

  vector_quantizer_acoustic_codec:
    _target_: nemo.collections.tts.modules.audio_codec_modules.GroupFiniteScalarQuantizer
    num_groups: ${acoustic_codebook_num}
    num_levels_per_group: ${codebook_levels}

  text_tokenizer:
    _target_: nemo.collections.common.tokenizers.text_to_speech.tts_tokenizers.IPATokenizer
    punct: true
    apostrophe: true
    pad_with_space: true
    skip_oov: false
    non_default_punct_list: [
      ',', '.', '!', '?', '-',
      ':', ';', '/', '"', '(',
      ')', '[', ']', '{', '}',
      '&', '<', '>', "«", "»",
      "'", '~', '+', '–', '—',
    ]
    g2p:
      _target_: nemo.collections.tts.g2p.models.i18n_ipa.IpaG2p
      phoneme_dict: ${phoneme_dict_path}
      heteronyms: ${heteronyms_path}
      phoneme_probability: 0.8
      use_chars: true
      use_stresses: false

  train_ds:
    dataset:
      dataset_type: ${train_ds_type}
      dataset_args:
        dataset_meta: ${train_ds_meta}
        feature_readers: ${feature_readers}
        pc_dropout_rate: 0.1
        min_words: 2
        min_duration: 1.0
        max_duration: 20.1

    dataloader_params:
      batch_size: ${batch_size}
      num_workers: 1

  validation_ds:
    dataset:
      dataset_type: default
      dataset_args:
        dataset_meta: ${val_ds_meta}
        feature_readers: ${feature_readers}
        min_words: 2
        min_duration: 1.0
        max_duration: 20.1

    dataloader_params:
      batch_size: 8
      num_workers: 1

  log_config:
    log_dir: ${log_dir}
    log_epochs: [1, 5]
    epoch_frequency: 10
    log_tensorboard: false
    log_wandb: false
    max_filename_len: 100

    generators:
      - _target_: nemo.collections.tts.parts.utils.callbacks.DiscreteSpeechArtifactGenerator
        audio_codec_name: ${audio_codec_name}
        audio_codec_path: ${audio_codec_path}
        log_audio: true
        log_audio_gta: false
        log_dequantized: false
        log_alignment: false
        log_semantic: false
        num_audio_iters: 10
        audio_temperature: 1.0
        audio_topk: 1
        num_duration_iters: 10
        duration_temperature: 1.0
        duration_topk: 1

    dataset:
      dataset_type: default
      dataset_args:
        dataset_meta: ${log_ds_meta}
        feature_readers: ${feature_readers}

    dataloader_params:
      batch_size: 8
      num_workers: 1

  aligner:
    _target_: nemo.collections.tts.modules.discrete_speech_modules.Aligner
    text_emb_dim: ${aligner_text_dim}
    alignment_encoder:
      _target_: nemo.collections.tts.modules.aligner.AlignmentEncoder
      n_mel_channels: ${codebook_dim}
      n_text_channels: ${aligner_text_dim}
      dist_type: cosine
      temperature: 20.0
      n_att_channels: 128
      n_mel_filters: 256
      condition_dim: ${context_emb_dim}
      condition_types:
        - add

  context_encoder:
    _target_: nemo.collections.tts.modules.discrete_speech_modules.ContextEncoder
    input_dim: ${codebook_dim}
    rnn_layers: 2
    rnn_dim: 512
    encoder:
      _target_: nemo.collections.tts.modules.discrete_speech_transformer.ContextTransformer
      n_layer: 8
      n_head: 8
      d_model: ${context_hidden_dim}
      d_head: 64
      d_inner: ${context_filters}
      kernel_size: 7

  context_aligner_encoder:
    _target_: nemo.collections.tts.modules.discrete_speech_modules.ContextUtteranceEncoder
    input_dim: ${codebook_dim}
    context_emb_dim: ${context_emb_dim}
    filters: 256
    rnn_layers: 1
    rnn_dim: 256

  text_encoder:
    _target_: nemo.collections.tts.modules.discrete_speech_transformer.TextEncoder
    n_layer: 8
    n_head: 12
    d_model: ${text_hidden_dim}
    d_context: ${context_hidden_dim}
    d_head: 64
    d_inner: ${text_filters}
    kernel_size: 1

  semantic_cond_layer:
    _target_: nemo.collections.tts.modules.discrete_speech_modules.SemanticConditioningLayer
    input_dim: ${semantic_codebook_dim}
    output_dim: ${text_hidden_dim}

  semantic_encoder:
    _target_: nemo.collections.tts.modules.discrete_speech_transformer.AudioEncoder
    input_dim: ${text_hidden_dim}
    transformer:
      _target_: nemo.collections.tts.modules.discrete_speech_transformer.AudioTransformer
      n_layer: 12
      n_head_self: 8
      n_head_context: 8
      d_model: ${audio_hidden_dim}
      d_context: ${context_hidden_dim}
      d_inner: ${audio_filters}
      d_head: 64
      kernel_size: 7

  semantic_decoder:
    _target_: nemo.collections.tts.modules.discrete_speech_modules.AudioDecoder
    num_codebooks: ${semantic_codebook_num}
    codebook_size: ${codebook_size}
    codebook_dim: ${semantic_codebook_dim}
    pre_net:
      _target_: nemo.collections.tts.modules.discrete_speech_modules.PreNet
      input_dim: ${semantic_codebook_dim}
      output_dim: ${audio_hidden_dim}
    fft:
      _target_: nemo.collections.tts.modules.discrete_speech_transformer.AudioTransformer
      n_layer: 6
      n_head_self: 8
      n_head_context: 8
      d_model: ${audio_hidden_dim}
      d_context: ${context_hidden_dim}
      d_inner: ${audio_filters}
      d_head: 64
      kernel_size: 7

  acoustic_encoder:
    _target_: nemo.collections.tts.modules.discrete_speech_transformer.AudioEncoder
    input_dim: ${text_hidden_dim}
    transformer:
      _target_: nemo.collections.tts.modules.discrete_speech_transformer.AudioTransformer
      n_layer: 12
      n_head_self: 8
      n_head_context: 8
      d_model: ${audio_hidden_dim}
      d_context: ${context_hidden_dim}
      d_inner: ${audio_filters}
      d_head: 64
      kernel_size: 7

  acoustic_decoder:
    _target_: nemo.collections.tts.modules.discrete_speech_modules.AudioDecoder
    num_codebooks: ${acoustic_codebook_train_num}
    codebook_size: ${acoustic_codebook_train_size}
    codebook_dim: ${acoustic_codebook_dim}
    pre_net:
      _target_: nemo.collections.tts.modules.discrete_speech_modules.PreNet
      input_dim: ${acoustic_codebook_dim}
      output_dim: ${audio_hidden_dim}
    fft:
      _target_: nemo.collections.tts.modules.discrete_speech_transformer.AudioTransformer
      n_layer: 6
      n_head_self: 8
      n_head_context: 8
      d_model: ${audio_hidden_dim}
      d_context: ${context_hidden_dim}
      d_inner: ${audio_filters}
      d_head: 64
      kernel_size: 7

  duration_encoder:
    _target_: nemo.collections.tts.modules.discrete_speech_transformer.DurationEncoder
    input_dim: ${text_hidden_dim}
    transformer:
      _target_: nemo.collections.tts.modules.discrete_speech_transformer.DurationTransformer
      n_layer: 6
      n_head_self: 8
      n_head_context: 8
      d_model: ${duration_hidden_dim}
      d_context: ${context_hidden_dim}
      d_inner: ${duration_filters}
      d_head: 64
      kernel_size: 7

  duration_decoder:
    _target_: nemo.collections.tts.modules.discrete_speech_modules.DurationDecoder
    num_duration: ${num_duration}
    fft:
      _target_: nemo.collections.tts.modules.discrete_speech_transformer.DurationTransformer
      n_layer: 6
      n_head_self: 8
      n_head_context: 8
      d_model: ${duration_hidden_dim}
      d_context: ${context_hidden_dim}
      d_inner: ${duration_filters}
      d_head: 64
      kernel_size: 7

  speaking_rate_predictor:
    _target_: nemo.collections.tts.modules.discrete_speech_modules.SpeakingRatePredictor
    num_speaking_rate: ${num_speaking_rate}
    context_dim: ${context_hidden_dim}

  speaking_rate_quantizer:
    _target_: nemo.collections.tts.modules.discrete_speech_modules.SpeakingRateQuantizer
    num_bins: ${num_speaking_rate}
    min_value: ${fps_min}
    max_value: ${fps_max}

  optim:
    name: adamw
    lr: 2e-2
    betas: [0.9, 0.999]
    weight_decay: 1e-6

    sched:
      name: NoamAnnealing
      warmup_steps: 40000
      last_epoch: -1
      d_model: 1  # Disable scaling based on model dim

trainer:
  num_nodes: 1
  devices: 1
  accelerator: gpu
  strategy: ddp
  precision: 16
  max_epochs: ${max_epochs}
  accumulate_grad_batches: 1
  gradient_clip_val: 10.0
  enable_checkpointing: false # Provided by exp_manager
  logger: false # Provided by exp_manager
  log_every_n_steps: 500
  check_val_every_n_epoch: 1
  benchmark: false

exp_manager:
  exp_dir: null
  name: ${name}
  create_tensorboard_logger: false
  create_checkpoint_callback: true
  checkpoint_callback_params:
    monitor: val_loss
    always_save_nemo: True
    save_top_k: 3
  resume_if_exists: false
  resume_ignore_no_checkpoint: false
