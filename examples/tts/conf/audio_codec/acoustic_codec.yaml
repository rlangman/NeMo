# This config contains the default values for training 44.1khz speech codec.
# If you want to train model on other dataset, you can change config values according to your dataset.
# Most dataset-specific arguments are in the head of the config file, see below.

name: AudioCodec

max_epochs: ???
# Adjust batch size based on GPU memory
batch_size: ???
steps_per_epoch: ???

# Dataset metadata for each manifest
# https://github.com/NVIDIA/NeMo/blob/main/nemo/collections/tts/data/vocoder_dataset.py#L39-L41
train_ds_type: ???
train_ds_meta: ???
val_ds_meta: ???

log_ds_meta: ???
log_dir: ???

semantic_codec_path: ???

# Modify these values based on your sample rate
sample_rate: 16000
output_sample_rate: 22050
samples_per_frame: 640
train_n_samples: 17640

decoder_input_filters: 768
resblock_up_sample_rates: [9, 7, 7]
resblock_up_sample_filters: [384, 128, 32]

num_codebooks: 6
num_levels_per_group: [4, 4, 4, 4, 4, 4]
acoustic_dim: 30
encoded_dim: 36

model:

  semantic_codec_path: ${semantic_codec_path}

  max_epochs: ${max_epochs}
  steps_per_epoch: ${steps_per_epoch}

  sample_rate: ${sample_rate}
  output_sample_rate: ${output_sample_rate}
  samples_per_frame: ${samples_per_frame}

  mel_loss_l1_scale: 5.0
  mel_loss_l2_scale: 0.0
  stft_loss_scale: 20.0
  time_domain_loss_scale: 0.0
  feature_loss_scale: 5.0
  commit_loss_scale: 0.0
  mmd_loss_scale: 5.0
  mmd_time_loss_scale: 1.0
  slm_loss_scale: 1.0

  mmd_loss_start_epoch: 1
  disc_start_epoch: 1

  use_slm_loss: true
  use_asr_loss: true

  # Probability of updating the discriminator during each training step
  # For example, update the discriminator 1/2 times (1 updates for every 2 batches)
  disc_updates_per_period: 1
  disc_update_period: 2

  # All resolutions for mel reconstruction loss, ordered [num_fft, hop_length, window_length]
  loss_resolutions: [[32, 8, 32], [64, 16, 64], [128, 32, 128], [256, 64, 256], [512, 128, 512], [1024, 256, 1024], [2048, 512, 2048]]
  mel_loss_dims: [5, 10, 20, 40, 80, 160, 320]
  mel_loss_log_guard: 0.5
  stft_loss_log_guard: 0.5
  feature_loss_type: absolute

  train_ds:
    dataset:
      dataset_type: ${train_ds_type}
      dataset_args:
        dataset_meta: ${train_ds_meta}
        sample_rate: ${output_sample_rate}
        n_samples: ${train_n_samples}
        min_duration: 0.5
        max_duration: null

    dataloader_params:
      batch_size: ${batch_size}
      drop_last: true
      num_workers: 2

  validation_ds:
    dataset:
      dataset_type: "vocoder"
      dataset_args:
        sample_rate: ${output_sample_rate}
        n_samples: null
        min_duration: null
        max_duration: null
        trunc_duration: 10.0 # Only use the first 10 seconds of audio for computing validation loss
        dataset_meta: ${val_ds_meta}

    dataloader_params:
      batch_size: 4
      num_workers: 1

  # Configures how audio samples are generated and saved during training.
  # Remove this section to disable logging.
  log_config:
    log_dir: ${log_dir}
    log_epochs: [1, 5]
    epoch_frequency: 10
    log_tensorboard: false
    log_wandb: false

    generators:
      - _target_: nemo.collections.tts.parts.utils.callbacks.AudioCodecArtifactGenerator
        log_audio: true
        log_encoding: false
        log_dequantized: false

    dataset:
      dataset_type: "vocoder"
      dataset_args:
        sample_rate: ${output_sample_rate}
        n_samples: null
        min_duration: null
        max_duration: null
        trunc_duration: 10.0 # Only log the first 10 seconds of generated audio.
        dataset_meta: ${log_ds_meta}

    dataloader_params:
      batch_size: 1
      num_workers: 1

  audio_encoder:
    _target_: nemo.collections.tts.modules.audio_codec_modules.MultiResolutionSTFTEncoder
    out_dim: ${acoustic_dim}
    resolutions: [ [ 80, 20, 80 ], [ 160, 40, 160 ], [ 320, 80, 320 ], [ 640, 160, 640 ], [ 1280, 320, 1280 ] ]
    resolution_filter_list: [ 256, 384, 512, 640, 768 ]
    down_sample_filter_list: [ 768 ]
    pad_mode: "replicate"

  audio_decoder:
    _target_: nemo.collections.tts.modules.audio_codec_modules.ResNetDecoder
    input_dim: ${encoded_dim}
    input_filters: ${decoder_input_filters}
    n_hidden_layers: 6
    hidden_filters: 1536
    activation: "half_snake"
    pad_mode: "replicate"
    is_causal: true
    pre_up_sample_rates: [ 2 ]
    pre_up_sample_filters: [ 768 ]
    resblock_up_sample_rates: ${resblock_up_sample_rates}
    resblock_up_sample_filters: ${resblock_up_sample_filters}

  vector_quantizer:
    _target_: nemo.collections.tts.modules.audio_codec_modules.GroupFiniteScalarQuantizer
    num_groups: ${num_codebooks}
    num_levels_per_group: ${num_levels_per_group}

  slm_encoder:
    _target_: nemo.collections.tts.modules.audio_codec_modules.SLMEncoder
    input_sr: ${output_sample_rate}

  slm_decoder:
    _target_: nemo.collections.tts.modules.audio_codec_modules.SLMDecoder
    in_channels: ${encoded_dim}
    hidden_dim: 1024
    out_channels: 1024
    up_sample_rate: 2

  asr_encoder:
    _target_: nemo.collections.tts.modules.audio_codec_modules.ASREncoder
    input_sr: ${output_sample_rate}

  asr_decoder:
    _target_: nemo.collections.tts.modules.audio_codec_modules.ASRDecoder
    in_channels: ${encoder_out_dim}
    hidden_dim: 1024
    out_channels: 1024
    down_sample_rate: 2

  discriminator:
    _target_: nemo.collections.tts.modules.audio_codec_modules.Discriminator
    discriminators:
      - _target_: nemo.collections.tts.modules.audio_codec_modules.MultiResolutionDiscriminatorSTFT
        resolutions: [ [ 128, 32, 128 ], [ 256, 64, 256 ], [ 512, 128, 512 ], [ 1024, 256, 1024 ], [ 2048, 512, 2048 ] ]
        stft_bands: [ [ 0.0, 1.0 ] ]
      - _target_: nemo.collections.tts.modules.audio_codec_modules.SLMDiscriminator
        slm_model_name: "microsoft/wavlm-base-plus"
        slm_sr: 16000
        input_sr: ${output_sample_rate}
        slm_hidden: 768
        slm_layers: 13
        initial_channel: 64
        use_spectral_norm: false

  generator_loss:
    _target_: nemo.collections.tts.losses.audio_codec_loss.GeneratorSquaredLoss

  discriminator_loss:
    _target_: nemo.collections.tts.losses.audio_codec_loss.DiscriminatorSquaredLoss

  mmd_loss:
    _target_: nemo.collections.tts.losses.audio_codec_loss.MMDEmbeddingLoss
    loss_fn:
      _target_: nemo.collections.tts.losses.audio_codec_loss.MMDLoss

  mmd_time_loss:
    _target_: nemo.collections.tts.losses.audio_codec_loss.MMDTimeLoss
    loss_fn:
      _target_: nemo.collections.tts.losses.audio_codec_loss.MMDLoss

  optim:
    _target_: torch.optim.Adam
    lr: 2e-4
    betas: [0.8, 0.99]

    sched:
      name: ExponentialLR
      gamma: 0.99

trainer:
  num_nodes: 1
  devices: 1
  accelerator: gpu
  strategy: ddp_find_unused_parameters_true
  precision: 32
  max_epochs: ${max_epochs}
  accumulate_grad_batches: 1
  enable_checkpointing: False # Provided by exp_manager
  logger: false # Provided by exp_manager
  log_every_n_steps: 500
  check_val_every_n_epoch: 1
  benchmark: false

exp_manager:
  exp_dir: null
  name: ${name}
  create_tensorboard_logger: false
  create_checkpoint_callback: true
  create_wandb_logger: false
  checkpoint_callback_params:
    monitor: val_loss
    always_save_nemo: True
    save_top_k: 3
  resume_if_exists: false
  resume_ignore_no_checkpoint: false
